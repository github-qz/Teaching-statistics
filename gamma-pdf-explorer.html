<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamma PDF Explorer (Fixed Scale)</title>
<style>
body {font-family: Arial; margin:24px; background:#f7f7f7;}
.container {max-width:950px; margin:auto; background:white; padding:24px; border-radius:12px;}
.control-group {display:grid; grid-template-columns:140px 1fr 110px; gap:10px; margin-bottom:12px;}
.value-box {background:#eee; padding:6px; text-align:center;}
canvas {border:1px solid #ccc;}
</style>
</head>
<body>
<div class="container">
<h2>Gamma PDF Explorer</h2>

<div class="control-group">
<label>Shape (r)</label>
<input type="range" id="r" min="0.5" max="10" step="0.1" value="2.0">
<div class="value-box" id="rVal">2.0</div>
</div>

<div class="control-group">
<label>Rate (λ)</label>
<input type="range" id="lambda" min="0.2" max="5" step="0.1" value="1.0">
<div class="value-box" id="lambdaVal">1.0</div>
</div>

<div class="control-group">
<label>Max y</label>
<input type="range" id="yMax" min="0.2" max="3.1" step="0.05" value="1.2">
<div class="value-box" id="yMaxVal">1.2</div>
</div>

<canvas id="plot" width="860" height="520"></canvas>
</div>

<script>
const canvas = document.getElementById("plot");
const ctx = canvas.getContext("2d");

const rSlider = document.getElementById("r");
const lambdaSlider = document.getElementById("lambda");
const yMaxSlider = document.getElementById("yMax");

const rVal = document.getElementById("rVal");
const lambdaVal = document.getElementById("lambdaVal");
const yMaxVal = document.getElementById("yMaxVal");

const margin = {left:70,right:30,top:30,bottom:60};
const W = canvas.width - margin.left - margin.right;
const H = canvas.height - margin.top - margin.bottom;

const xMin = 0;
const xMax = 20;
const TOP_CLIP_Y = 3.1;

function gamma(z){
  const g = 7;
  const p = [
    0.99999999999980993,
    676.5203681218851,
    -1259.1392167224028,
    771.32342877765313,
    -176.61502916214059,
    12.507343278686905,
    -0.13857109526572012,
    9.9843695780195716e-6,
    1.5056327351493116e-7
  ];
  if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
  z -= 1;
  let x = p[0];
  for (let i = 1; i < g + 2; i++) x += p[i] / (z + i);
  const t = z + g + 0.5;
  return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
}

function pdf(x, r, lambda){
  if (x <= 0) return 0;
  return Math.pow(lambda, r) * Math.pow(x, r - 1) * Math.exp(-lambda * x) / gamma(r);
}

function xC(x){
  return margin.left + (x - xMin) / (xMax - xMin) * W;
}

function yC(y, yMax){
  return margin.top + H - (y / yMax) * H;
}

function drawAxes(yMax){
  ctx.strokeStyle = "black";
  ctx.fillStyle = "black";
  ctx.lineWidth = 1;

  // x-axis
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top + H);
  ctx.lineTo(margin.left + W, margin.top + H);
  ctx.stroke();

  // y-axis
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, margin.top + H);
  ctx.stroke();

  // x-axis ticks and labels
  const xTicks = 5;
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  for(let i = 0; i <= xTicks; i++){
    const x = xMin + i * (xMax - xMin) / xTicks;
    const cx = xC(x);

    ctx.beginPath();
    ctx.moveTo(cx, margin.top + H);
    ctx.lineTo(cx, margin.top + H + 6);
    ctx.stroke();

    ctx.fillText(x.toFixed(1), cx, margin.top + H + 10);
  }

  // y-axis ticks and labels
  const yTicks = 5;
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for(let i = 0; i <= yTicks; i++){
    const y = i * yMax / yTicks;
    const cy = yC(y, yMax);

    ctx.beginPath();
    ctx.moveTo(margin.left - 6, cy);
    ctx.lineTo(margin.left, cy);
    ctx.stroke();

    ctx.fillText(y.toFixed(2), margin.left - 10, cy);
  }
}

// For r < 1, find the first x where pdf(x) <= targetY.
// This lets the curve start where it enters the visible window if Max y = 3.1.
function findStartXForTopClip(r, lambda, targetY){
  const step = 1e-4;
  let x = step;

  while (x <= xMax) {
    if (pdf(x, r, lambda) <= targetY) return x;
    x += step;
  }
  return xMax;
}

function draw(r, lambda, yMax){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAxes(yMax);

  let startX;
  const step = (xMax - xMin) / 3000;

  if (r > 1) {
    startX = 0;
  } else if (r < 1) {
    startX = findStartXForTopClip(r, lambda, TOP_CLIP_Y);
  } else {
    // r = 1: avoid drawing the artificial vertical segment at x=0
    startX = step;
  }

  ctx.beginPath();
  ctx.strokeStyle = "blue";
  ctx.lineWidth = 2;

  let started = false;
  for (let x = startX; x <= xMax; x += step) {
    const y = pdf(x, r, lambda);
    const cx = xC(x);
    const cy = yC(Math.min(y, yMax), yMax);

    if (!started) {
      ctx.moveTo(cx, cy);
      started = true;
    } else {
      ctx.lineTo(cx, cy);
    }
  }
  ctx.stroke();
}

function update(){
  const r = parseFloat(rSlider.value);
  const lambda = parseFloat(lambdaSlider.value);
  const yMax = parseFloat(yMaxSlider.value);

  rVal.textContent = r.toFixed(1);
  lambdaVal.textContent = lambda.toFixed(1);
  yMaxVal.textContent = yMax.toFixed(2);

  draw(r, lambda, yMax);
}

rSlider.oninput = update;
lambdaSlider.oninput = update;
yMaxSlider.oninput = update;

update();
</script>
</body>
</html>
