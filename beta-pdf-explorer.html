<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beta Density Explorer</title>

<style>
body {
  font-family: Arial;
  background: #f7f7f7;
  margin: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
}

label {
  width: 120px;
  display: inline-block;
}

input[type="range"] {
  width: 400px;
}

.value {
  display: inline-block;
  width: 60px;
  text-align: right;
  font-family: monospace;
}

svg {
  width: 100%;
  height: 500px;
  border: 1px solid #ccc;
}

.axis { stroke: black; }
.grid { stroke: #ddd; }
.tick { stroke: black; }

.pdf {
  fill: none;
  stroke: steelblue;
  stroke-width: 3;
}
</style>
</head>

<body>

<div class="container">
<h2>Beta Density Explorer</h2>

<div>
<label>a:</label>
<input id="aSlider" type="range" min="0.2" max="10" step="0.1" value="2">
<span id="aVal" class="value">2.0</span>
</div>

<div>
<label>b:</label>
<input id="bSlider" type="range" min="0.2" max="10" step="0.1" value="2">
<span id="bVal" class="value">2.0</span>
</div>

<div>
<label>Max y:</label>
<input id="ySlider" type="range" min="0.2" max="6" step="0.1" value="3">
<span id="yVal" class="value">3.0</span>
</div>

<svg id="plot"></svg>
</div>

<script>
const svg = document.getElementById("plot");

const aSlider = document.getElementById("aSlider");
const bSlider = document.getElementById("bSlider");
const ySlider = document.getElementById("ySlider");

const aVal = document.getElementById("aVal");
const bVal = document.getElementById("bVal");
const yVal = document.getElementById("yVal");

const W = 900, H = 500;

const margin = {left:70, right:30, top:30, bottom:60};

svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

function logGamma(z){
  const c=[676.52,-1259.14,771.32,-176.62,12.51,-0.14,1e-5,1e-7];
  if(z<0.5) return Math.log(Math.PI)-Math.log(Math.sin(Math.PI*z))-logGamma(1-z);
  z-=1;
  let x=0.9999999999998;
  for(let i=0;i<c.length;i++) x+=c[i]/(z+i+1);
  let t=z+c.length-0.5;
  return 0.5*Math.log(2*Math.PI)+(z+0.5)*Math.log(t)-t+Math.log(x);
}

function betaPDF(x,a,b){
  if(x<=0||x>=1) return 0;
  const logB = logGamma(a)+logGamma(b)-logGamma(a+b);
  return Math.exp((a-1)*Math.log(x)+(b-1)*Math.log(1-x)-logB);
}

function xScale(x){
  return margin.left + x*(W-margin.left-margin.right);
}

function yScale(y,yMax){
  return H - margin.bottom - y/yMax*(H-margin.top-margin.bottom);
}

function draw(){
  svg.innerHTML="";

  const a=parseFloat(aSlider.value);
  const b=parseFloat(bSlider.value);
  const userMaxY=parseFloat(ySlider.value);

  aVal.textContent=a.toFixed(1);
  bVal.textContent=b.toFixed(1);
  yVal.textContent=userMaxY.toFixed(1);

  let pts=[];
  for(let i=1;i<999;i++){
    let x=i/1000;
    let y=betaPDF(x,a,b);
    if(isFinite(y)) pts.push({x,y});
  }

  const dataMaxY = Math.max(...pts.map(p=>p.y));

  // === FIX: exact top alignment ===
  let plotMaxY;
  if(dataMaxY > userMaxY){
    plotMaxY = dataMaxY;   // curve touches top grid
  } else {
    plotMaxY = userMaxY;
  }

  // GRID + Y TICKS
  let ticks=5;
  for(let i=0;i<=ticks;i++){
    let yValTick = plotMaxY*i/ticks;
    let yPos = yScale(yValTick,plotMaxY);

    svg.appendChild(line(margin.left,yPos,W-margin.right,yPos,"grid"));
    svg.appendChild(line(margin.left-5,yPos,margin.left,yPos,"tick"));

    svg.appendChild(text(margin.left-10,yPos+4,"end",yValTick.toFixed(2)));
  }

  // X GRID
  for(let i=0;i<=10;i++){
    let x=i/10;
    let px=xScale(x);

    svg.appendChild(line(px,margin.top,px,H-margin.bottom,"grid"));
    svg.appendChild(line(px,H-margin.bottom,px,H-margin.bottom+5,"tick"));

    svg.appendChild(text(px,H-margin.bottom+20,"middle",x.toFixed(1)));
  }

  // AXES
  svg.appendChild(line(margin.left,H-margin.bottom,W-margin.right,H-margin.bottom,"axis"));
  svg.appendChild(line(margin.left,margin.top,margin.left,H-margin.bottom,"axis"));

  // CURVE
  let d="";
  pts.forEach((p,i)=>{
    let px=xScale(p.x);
    let py=yScale(p.y,plotMaxY);
    d += (i===0 ? "M":"L") + px + " " + py + " ";
  });

  let path=document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",d);
  path.setAttribute("class","pdf");
  svg.appendChild(path);
}

function line(x1,y1,x2,y2,cls){
  let l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",x1); l.setAttribute("y1",y1);
  l.setAttribute("x2",x2); l.setAttribute("y2",y2);
  l.setAttribute("class",cls);
  return l;
}

function text(x,y,anchor,str){
  let t=document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x",x);
  t.setAttribute("y",y);
  t.setAttribute("text-anchor",anchor);
  t.textContent=str;
  return t;
}

aSlider.oninput=draw;
bSlider.oninput=draw;
ySlider.oninput=draw;

draw();
</script>

</body>
</html>
